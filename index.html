<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Лабораторна робота №5. game</h1>

        <div id="setup" class="panel controls-panel">
            <div class="control-group">
                <label for="difficulty">Оберіть складність:</label>
                <select id="difficulty">
                    <option value="">--Будь ласка, оберіть--</option>
                    <option value="lazy">Легкий (Easy)</option>
                    <option value="normal">Звичайний (Normal)</option>
                    <option value="catchme">Спіймай, якщо зможеш (Hard)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="color">Колір:</label>
                <select id="color">
                    <option value="">--Будь ласка, оберіть--</option>
                    <option value="red">Червоний</option>
                    <option value="green">Зелений</option>
                    <option value="blue">Синій</option>
                </select>
            </div>

        <button id="start-btn">Старт</button>
    </div>

    <div id="game-info" class="panel stats-panel" style="display:none;">
        <div class="stats-box">Рахунок: <span id="score">0</span></div>
        <div class="stat-box timer-box">Залишилось часу: <span id="timer">0</span></div>
    </div>

    <div id="game-field">
        <div id="pixel"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
